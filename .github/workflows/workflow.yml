name: Deploy Turkey Team Backend Server to EC2

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+-p.[0-9]+"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. JDK 설치
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build -x test

      # 3. AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}

      # 4. Docker Hub 로그인 (push용)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Docker 이미지 build & push
      - name: Build & Push Backend Service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/turkey-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/turkey-backend:latest

      # 6. SSH로 EC2에 접속
      - name: SSH로 EC2에 접속
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_PRIVATE_KEY}}
          script_stop: true
          script: |
            docker stop turkey-backend || true
            docker rm turkey-backend || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/turkey-backend:latest
            docker run -d --name turkey-backend -p 80:8080 ${{ secrets.DOCKERHUB_USERNAME }}/turkey-backend:latest
